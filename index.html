<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAW Photo Vault</title>
<style>
:root{--bg:#1a1a1a;--bg2:#222;--bg3:#252525;--bg4:#2a2a2a;--bg5:#333;--bd:#3a3a3a;--t1:#ccc;--t2:#999;--tw:#fff;--ac:#4a9eff;--ac3:#1a2a3a;--ok:#4caf84;--err:#e05555;--fn:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;--sw:260px;--th:44px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--fn);background:var(--bg);color:var(--t1);display:flex;flex-direction:column;user-select:none}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
.toolbar{height:var(--th);background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:6px;z-index:100;flex-shrink:0}
.toolbar .logo{font-size:14px;font-weight:700;color:var(--tw);margin-right:12px}
.toolbar .logo span{color:var(--ac)}
.toolbar .sep{width:1px;height:18px;background:var(--bd);margin:0 2px}
.toolbar button{background:transparent;border:1px solid transparent;color:var(--t1);padding:5px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:var(--fn);white-space:nowrap;transition:all 0.15s;display:flex;align-items:center;gap:4px}
.toolbar button:hover{background:var(--bg5);border-color:var(--bd)}
.toolbar button.primary{background:var(--ac);color:#fff;border-color:var(--ac)}
.toolbar button:disabled{opacity:0.35;cursor:default}
.main-layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:10px 12px;border-bottom:1px solid var(--bd);font-size:11px;font-weight:600;color:var(--t2);display:flex;justify-content:space-between}
.sidebar-list{flex:1;overflow-y:auto;padding:4px}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all 0.12s}
.sidebar-item:hover{background:var(--bg5)}
.sidebar-item.active{background:var(--ac3);border-color:var(--ac)}
.sidebar-item .thumb{width:48px;height:36px;border-radius:3px;object-fit:cover;background:var(--bg4);flex-shrink:0}
.sidebar-item .info{flex:1;min-width:0}
.sidebar-item .name{font-size:11px;font-weight:500;color:var(--tw);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-item .meta{font-size:9px;color:var(--t2)}
.sidebar-item .badge{font-size:8px;padding:1px 5px;border-radius:8px;font-weight:600}
.badge-raw{background:#e07b30;color:#fff}
.badge-other{background:#555;color:#999}
.sidebar-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t2);font-size:12px;gap:10px;padding:20px;text-align:center}
.sidebar-empty .icon{font-size:36px;opacity:0.4}
.viewer{flex:1;display:flex;align-items:center;justify-content:center;background:#111;overflow:hidden;position:relative}
.viewer img{max-width:100%;max-height:100%;object-fit:contain;image-rendering:auto;box-shadow:0 2px 30px rgba(0,0,0,0.5)}
.viewer .info-bar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#fff;padding:6px 14px;border-radius:16px;font-size:10px;pointer-events:none;display:flex;gap:12px}
.viewer-empty{color:var(--t2);font-size:13px;text-align:center;line-height:1.8}
.viewer-empty .icon{font-size:56px;display:block;margin-bottom:14px;opacity:0.3}
.viewer-empty .hint{font-size:11px;opacity:0.6;margin-top:6px}
.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);z-index:10}
.loading .spin{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin 0.8s linear infinite}
.loading .msg{color:var(--t2);font-size:11px;margin-left:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.statusbar{height:24px;background:var(--bg2);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:14px;font-size:10px;color:var(--t2);flex-shrink:0}
.drop-overlay{position:fixed;inset:0;background:rgba(30,70,120,0.85);z-index:900;display:flex;align-items:center;justify-content:center;border:3px dashed var(--ac);pointer-events:none;opacity:0;transition:opacity 0.2s}
.drop-overlay.on{opacity:1}
.drop-overlay .text{font-size:22px;font-weight:700;color:#fff;text-align:center}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:18px;max-width:480px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,0.5)}
.modal h3{font-size:14px;color:var(--tw);margin-bottom:10px}
.modal p{font-size:11px;color:var(--t2);margin-bottom:6px;line-height:1.6}
.modal .btns{display:flex;gap:6px;margin-top:14px;justify-content:flex-end}
.modal .btns button{padding:7px 14px;border-radius:4px;cursor:pointer;font-size:11px;font-family:var(--fn);border:1px solid var(--bd);background:var(--bg4);color:var(--t1)}
.modal .btns button.primary{background:var(--ac);color:#fff;border-color:var(--ac)}
.modal .btns button.danger{background:var(--err);color:#fff;border-color:var(--err)}
.modal .fgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.modal .fopt{padding:10px 6px;text-align:center;border:2px solid var(--bd);border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;background:var(--bg4);color:var(--t1);transition:all 0.15s;font-family:var(--fn)}
.modal .fopt:hover,.modal .fopt.sel{border-color:var(--ac);background:#1a2a3a;color:var(--ac)}
.modal .qrow{display:flex;align-items:center;gap:8px;margin-top:10px}
.modal .qrow input[type=range]{flex:1}
.toast-box{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{padding:9px 16px;border-radius:6px;font-size:11px;font-weight:500;pointer-events:auto;box-shadow:0 4px 16px rgba(0,0,0,0.4);text-align:center;animation:ti 0.3s ease,to 0.3s ease 2.5s forwards}
.toast.info{background:#2a4a6a;color:#b8d8ff}
.toast.ok{background:#2a4a3a;color:#a0e0b8}
.toast.err{background:#4a2a2a;color:#f0a0a0}
@keyframes ti{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes to{from{opacity:1}to{opacity:0}}

/* Login */
.login-overlay{position:fixed;inset:0;background:var(--bg);z-index:5000;display:flex;align-items:center;justify-content:center;flex-direction:column}
.login-card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:30px 28px;width:360px;max-width:92%;box-shadow:0 8px 40px rgba(0,0,0,0.5);text-align:center}
.login-card .login-logo{font-size:24px;font-weight:700;color:var(--tw);margin-bottom:6px}
.login-card .login-logo span{color:var(--ac)}
.login-card .login-sub{font-size:11px;color:var(--t2);margin-bottom:22px}
.login-card .field{text-align:left;margin-bottom:14px}
.login-card .field label{display:block;font-size:10px;font-weight:600;color:var(--t2);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.login-card .field input{width:100%;padding:9px 11px;border-radius:5px;border:1px solid var(--bd);background:var(--bg4);color:var(--tw);font-size:13px;font-family:var(--fn);outline:none;transition:border 0.15s}
.login-card .field input:focus{border-color:var(--ac)}
.login-card .login-btn{width:100%;padding:10px;border-radius:5px;border:none;background:var(--ac);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fn);margin-top:6px;transition:opacity 0.15s}
.login-card .login-btn:hover{opacity:0.9}
.login-card .login-btn:disabled{opacity:0.5;cursor:default}
.login-card .login-err{font-size:10px;color:var(--err);margin-top:10px;min-height:16px}
.login-card .login-hint{font-size:9px;color:var(--t2);margin-top:14px;line-height:1.6}

/* Register modal */
.modal .form-field{margin-bottom:10px}
.modal .form-field label{display:block;font-size:10px;font-weight:600;color:var(--t2);margin-bottom:3px;text-transform:uppercase}
.modal .form-field input{width:100%;padding:8px 10px;border-radius:4px;border:1px solid var(--bd);background:var(--bg4);color:var(--tw);font-size:12px;font-family:var(--fn);outline:none}
.modal .form-field input:focus{border-color:var(--ac)}
.modal .form-err{font-size:10px;color:var(--err);min-height:14px;margin-top:2px}
.toolbar .badge-admin{font-size:8px;padding:2px 6px;border-radius:8px;background:var(--ac);color:#fff;font-weight:600;margin-left:2px}

/* Sections */
.sec-header{padding:7px 12px;font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:4px;border-bottom:1px solid var(--bd);border-top:1px solid var(--bd);user-select:none;background:var(--bg3);position:sticky;top:0;z-index:1}
.sec-header:hover{color:var(--tw)}
.sec-header .arr{transition:transform 0.2s;font-size:9px;display:inline-block}
.sec-header.folded .arr{transform:rotate(-90deg)}
.sec-body.hidden{display:none}
.sec-count{font-size:9px;color:var(--t2);margin-left:auto}

/* Source badge */
.src-badge{font-size:7px;padding:1px 5px;border-radius:6px;background:#5b3a9e;color:#c8b8f0;white-space:nowrap;flex-shrink:0}

/* Send dialog */
.send-user-list{max-height:240px;overflow-y:auto;margin:8px 0}
.send-user-card{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:6px;cursor:pointer;border:2px solid var(--bd);margin-bottom:4px;transition:all 0.15s}
.send-user-card:hover{background:var(--bg5);border-color:var(--ac)}
.send-user-card.sel{background:#1a2a3a;border-color:var(--ac)}
.send-user-icon{font-size:15px}
.send-user-name{font-weight:600;font-size:12px;color:var(--tw);flex:1}
.send-user-role{font-size:9px;color:var(--t2)}
.send-err{font-size:10px;color:var(--err);min-height:14px;margin-top:6px}

/* Mobile */
@media(max-width:768px){
  :root{--sw:100%;--th:40px}
  body{overflow:auto}
  .toolbar{padding:0 4px;gap:3px}
  .toolbar .logo{font-size:12px;margin-right:4px}
  .toolbar button{padding:4px 7px;font-size:10px;gap:2px}
  .toolbar button .btn-label{display:none}
  .toolbar button.primary{padding:4px 8px}
  .main-layout{flex-direction:column}
  .sidebar{width:100%;max-height:45vh;border-right:none;border-bottom:1px solid var(--bd);flex-shrink:0;transition:max-height 0.25s ease}
  .sidebar.collapsed{max-height:0;overflow:hidden;border-bottom:none}
  .sidebar-header{padding:6px 10px;font-size:10px}
  .sidebar-list{padding:2px}
  .sec-header{padding:5px 8px;font-size:10px}
  .sidebar-item{padding:6px;border-radius:4px}
  .sidebar-item .thumb{width:40px;height:30px;border-radius:2px}
  .sidebar-item .name{font-size:10px}
  .sidebar-item .meta{font-size:8px}
  .sidebar-item .badge{font-size:7px;padding:1px 3px}
  .viewer{min-height:40vh;flex:1}
  .viewer img{max-width:98%;max-height:98%}
  .viewer .info-bar{padding:4px 10px;font-size:9px;gap:8px;bottom:8px}
  .mobile-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:50;background:rgba(0,0,0,0.5);color:#fff;border:none;font-size:20px;width:36px;height:48px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:opacity 0.2s}
  .mobile-nav:active{background:rgba(0,0,0,0.8)}
  .mobile-nav.prev{left:4px}
  .mobile-nav.next{right:4px}
  .sidebar-toggle-bar{display:flex;align-items:center;justify-content:center;padding:3px;background:var(--bg3);border-bottom:1px solid var(--bd);cursor:pointer}
  .sidebar-toggle-bar .handle{width:40px;height:4px;border-radius:2px;background:var(--bd)}
  .statusbar{height:20px;padding:0 6px;gap:8px;font-size:9px}
  .modal{padding:14px;border-radius:6px}
  .modal h3{font-size:13px;margin-bottom:8px}
  .modal .fgrid{grid-template-columns:1fr 1fr}
  .modal .fopt{padding:8px 4px;font-size:10px}
  .modal .btns button{padding:6px 10px;font-size:10px}
  .send-user-card{padding:8px 10px}
  .send-user-name{font-size:11px}
  .login-card{padding:24px 20px;width:340px}
  .login-card .login-logo{font-size:20px}
  .login-card .field input{padding:8px 10px;font-size:12px}
  .drop-overlay .text{font-size:16px}
  .toast-box{bottom:20px}
  .toast{padding:7px 12px;font-size:10px}
  .sidebar-empty .icon{font-size:28px}
}
.sidebar-toggle-bar{display:none}
@media(max-width:768px){.sidebar-toggle-bar{display:flex}}
</style>
</head>
<body>

<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <div class="login-logo">RAW<span>Vault</span></div>
    <div class="login-sub">请登录以查看您的照片库</div>
    <div class="field"><label>用户名</label><input type="text" id="login-user" placeholder="请输入用户名" autocomplete="username"></div>
    <div class="field"><label>密码</label><input type="password" id="login-pass" placeholder="请输入密码" autocomplete="current-password"></div>
    <button class="login-btn" id="login-btn" onclick="Auth.doLogin()">登 录</button>
    <div class="login-err" id="login-err"></div>
    <div class="login-hint">管理员可注册新用户账号</div>
  </div>
</div>

<div class="toolbar" id="toolbar" style="display:none">
  <div class="logo">RAW<span>Vault</span></div>
  <button onclick="App.importFiles()">📁 <span class="btn-label">导入</span></button>
  <button id="btn-dl" class="primary" onclick="App.showExport()" disabled>💾 <span class="btn-label">下载</span></button>
  <button id="btn-del" onclick="App.deleteCurrent()" disabled>🗑 <span class="btn-label">删除</span></button>
  <button id="btn-send" onclick="App.showSend()" disabled>📨 <span class="btn-label">发送</span></button>
  <button id="btn-reg" onclick="App.showRegister()" style="display:none">👤 <span class="btn-label">注册用户</span></button>
  <span style="flex:1"></span>
  <span id="st-user" style="font-size:10px;color:var(--ac)"></span>
  <button id="btn-logout" onclick="Auth.logout()">🚪 退出</button>
  <span style="font-size:10px;color:var(--t2)" id="st-count">共 0 张</span>
</div>

<div class="main-layout" id="main-layout" style="display:none">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">照片库 <span id="sidebar-count">0</span></div>
    <div class="sidebar-toggle-bar" onclick="App.toggleSidebar()"><div class="handle"></div></div>
    <div class="sidebar-list" id="sidebar-list">
      <div class="sidebar-empty"><span class="icon">📷</span><div>还没有导入照片</div><div style="font-size:10px;opacity:0.6">点击「导入」或拖拽文件到此窗口</div></div>
    </div>
  </div>
  <div class="viewer" id="viewer">
    <div class="viewer-empty" id="viewer-empty"><span class="icon">🖼️</span><div>导入照片即可查看</div><div class="hint">RAW (CR2, NEF, ARW, DNG 等)<br>JPEG / PNG / TIFF / WebP</div></div>
    <img id="viewer-img" style="display:none" alt="">
    <button class="mobile-nav prev" id="nav-prev" style="display:none" onclick="App.navPhoto(-1)">◀</button>
    <button class="mobile-nav next" id="nav-next" style="display:none" onclick="App.navPhoto(1)">▶</button>
    <div class="info-bar" id="info-bar" style="display:none">
      <span id="info-name"></span><span id="info-size"></span><span id="info-dim"></span><span id="info-fmt"></span><span id="info-source" style="display:none"></span>
    </div>
    <div class="loading" id="loading" style="display:none"><div class="spin"></div><span class="msg" id="loading-msg"></span></div>
  </div>
</div>

<div class="statusbar" id="statusbar" style="display:none">
  <span id="st-file">未打开文件</span><span style="flex:1"></span><span id="st-device"></span><span id="st-store"></span>
</div>

<div class="drop-overlay" id="drop-overlay"><div class="text">📥<br>释放导入</div></div>
<div class="toast-box" id="toast-box"></div>
<input type="file" id="file-input" multiple accept="image/*,.cr2,.nef,.arw,.dng,.orf,.raf,.rw2,.cr3,.pef,.3fr,.mrw,.nrw,.srf,.sr2,.x3f,.erf,.mef,.dcr,.kdc,.raw" style="position:fixed;top:-100px;left:-100px;width:1px;height:1px;opacity:0">

<script>
// ============================================================
// Utilities
// ============================================================
var RAW_EXT=['cr2','cr3','nef','arw','dng','orf','raf','rw2','pef','3fr','mrw','nrw','srf','sr2','x3f','erf','mef','dcr','kdc','raw'];
function uid(){return Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,8);}
function fmtSize(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function toast(msg,tp){tp=tp||'info';var c=document.getElementById('toast-box');var e=document.createElement('div');e.className='toast '+tp;e.textContent=msg;c.appendChild(e);setTimeout(function(){e.remove();},2800);}
function getDeviceId(){try{var s=localStorage.getItem('rv_deviceId');if(s)return s;var id=uid();localStorage.setItem('rv_deviceId',id);return id;}catch(e){return uid();}}
function detectDeviceName(){
  var ua=navigator.userAgent,os='Unknown',browser='Browser';
  if(/Windows/i.test(ua))os='Windows';else if(/Mac/i.test(ua))os='Mac';else if(/iPhone|iPad|iPod/i.test(ua))os='iOS';else if(/Android/i.test(ua))os='Android';else if(/Linux/i.test(ua))os='Linux';
  if(/Edg\//i.test(ua))browser='Edge';else if(/Chrome/i.test(ua)&&!/Edg\//i.test(ua))browser='Chrome';else if(/Safari/i.test(ua)&&!/Chrome/i.test(ua)&&!/Edg\//i.test(ua))browser='Safari';else if(/Firefox/i.test(ua))browser='Firefox';
  return os+' '+browser;
}

  // Pure-JS SHA-256 fallback for environments where crypto.subtle is unavailable
  function sha256Pure(str){
    function rotr(w,n){return((w>>>n)|(w<<(32-n)))>>>0;}
    function ch(x,y,z){return(x&y)^(~x&z);}function maj(x,y,z){return(x&y)^(x&z)^(y&z);}
    function bs0(x){return rotr(x,2)^rotr(x,13)^rotr(x,22);}function bs1(x){return rotr(x,6)^rotr(x,11)^rotr(x,25);}
    function ss0(x){return rotr(x,7)^rotr(x,18)^(x>>>3);}function ss1(x){return rotr(x,17)^rotr(x,19)^(x>>>10);}
    var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cd3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
    var bytes=[];for(var i=0;i<str.length;i++){var c=str.charCodeAt(i);if(c<0x80)bytes.push(c);else if(c<0x800){bytes.push(0xc0|(c>>6),0x80|(c&0x3f));}else{bytes.push(0xe0|(c>>12),0x80|((c>>6)&0x3f),0x80|(c&0x3f));}}
    bytes.push(0x80);while((bytes.length+8)%64!==0)bytes.push(0);
    var bl=str.length*8;for(var i=3;i>=0;i--)bytes.push((bl>>>(i*8))&0xff);
    var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
    for(var pos=0;pos<bytes.length;pos+=64){

DB.open=function(){
  if(!IDB_AVAILABLE){console.warn('[RAW Vault] IndexedDB 不支持，使用内存模式');return Promise.resolve();}

    try{
      var req=indexedDB.open('RawVault3',1);

        try{
          var db=e.target.result;
          var names=db.objectStoreNames;
          if(!names.contains('u'))db.createObjectStore('u',{keyPath:'id'});
          if(!names.contains('p'))db.createObjectStore('p',{keyPath:'id'});
        }catch(ex){console.error('[RAW Vault] 升级数据库失败:',ex);}
      };
      req.onsuccess=function(e){self._db=e.target.result;console.log('[RAW Vault] 数据库已打开');ok();};
      req.onerror=function(e){console.error('[RAW Vault] 打开数据库失败:',e.target.error);err(e.target.error||new Error('无法打开数据库'));};
      req.onblocked=function(){console.warn('[RAW Vault] 数据库被阻塞，请关闭其他标签页');err(new Error('数据库被阻塞'));};
    }catch(ex){console.error('[RAW Vault] indexedDB.open 异常:',ex);err(ex);}

// User operations
DB.addUser=function(user){
  if(!IDB_AVAILABLE){var u=Object.assign({},user);DB._mem.users.push(u);return Promise.resolve();}
  return new Promise(function(ok,err){try{DB._ensure();var t=DB._db.transaction('u','readwrite');var r=t.objectStore('u').add(user);r.onsuccess=function(){ok();};r.onerror=function(e){err(e.target.error);};}catch(e){err(e);}});
};

// Photo operations
DB.addPhoto=function(p){

DB.getPhotos=function(userId){

// Note: renamed from deletePhoto to removePhoto — "delete" is a JS reserved word

};

function extractBestJPEG(ab){
  var b=new Uint8Array(ab);

    var v=new DataView(ab),le=(v.getUint16(0)===0x4949);

        else for(var i=0;i<sub.cnt;i++)offs.push(v.getUint32(sub.vo+i*4,le));

          var se=_readIFD(v,offs[oi],le);

            var dOff=v.getUint32(se[0x0111].vo,le),dLen=v.getUint32(se[0x0117].vo,le);
            if(dLen>30000)return b.slice(dOff,dOff+dLen);

      if(jOff&&jLen&&jLen.val>30000)return b.slice(jOff.val,jOff.val+jLen.val);
    }
  }catch(e){}
  var best=null;
  for(var i=0;i<b.length-3;i++){
    if(b[i]===0xFF&&b[i+1]===0xD8&&b[i+2]===0xFF){
      for(var j=i+2;j<Math.min(i+50000000,b.length-1);j++){
        if(b[j]===0xFF&&b[j+1]===0xD9){var len=j+2-i;if(len>10000&&(!best||len>best.len))best={off:i,len:len};break;}
        if(b[j]===0xFF&&b[j+1]===0xDA){var k=j+2;while(k<b.length-1){if(b[k]===0xFF&&b[k+1]!==0x00&&b[k+1]!==0xFF){j=k-1;break;}k++;}if(k>=b.length-1)break;}
      }
    }

  return best?b.slice(best.off,best.off+best.len):null;
}
function _readIFD(v,offset,le){
  var e={};
  try{
    var cnt=v.getUint16(offset,le);
    for(var i=0;i<cnt&&i<100;i++){
      var eo=offset+2+i*12,tag=v.getUint16(eo,le),type=v.getUint16(eo+2,le),cn=v.getUint32(eo+4,le);
      var ts=({1:1,2:1,3:2,4:4,5:8,6:1,7:1,8:2,9:4,10:8,11:4,12:8,13:4})[type]||1;
      var total=cn*ts,vo=total<=4?(eo+8):v.getUint32(eo+8,le);
      var val;if(type===3)val=total<=4?v.getUint16(eo+8,le):v.getUint16(vo,le);else if(type===4||type===13)val=total<=4?v.getUint32(eo+8,le):v.getUint32(vo,le);else val=total<=4?v.getUint32(eo+8,le):v.getUint32(vo,le);
      e[tag]={tag:tag,type:type,cnt:cn,val:val,vo:vo,total:total,voLoc:eo+8};
    }
  }catch(ex){}

}

  },

  _renderFlatList:function(container,photos){var self=this;for(var i=0;i<photos.length;i++){(function(p){var d=document.createElement('div');d.className='sidebar-item';if(self.cur&&self.cur.id===p.id)d.classList.add('active');var src='';if(p.sourceUserId&&p.sourceUsername)src='<span class="src-badge">📨 '+esc(p.sourceUsername)+'</span>';d.innerHTML='<img class="thumb" src="'+self.urlCache[p.id+'_t']+'" loading="lazy"><div class="info"><div class="name">'+esc(p.fileName)+'</div><div class="meta">'+fmtSize(p.fileSize)+' · '+p.dispW+'×'+p.dispH+'</div></div>'+src+'<span class="badge '+(p.format==='raw'?'badge-raw':'badge-other')+'">'+p.format.toUpperCase()+'</span>';d.addEventListener('click',function(){self._select(p.id);});container.appendChild(d);})(photos[i]);}},

  _renderSection:function(parent,section){var self=this;var h=document.createElement('div');h.className='sec-header';if(self._sectionState[section.id])h.classList.add('folded');h.innerHTML='<span class="arr">▼</span>'+section.label+'<span class="sec-count">'+section.photos.length+'</span>';var b=document.createElement('div');b.className='sec-body';if(self._sectionState[section.id])b.classList.add('hidden');self._renderFlatList(b,section.photos);h.addEventListener('click',function(){self._sectionState[section.id]=!self._sectionState[section.id];h.classList.toggle('folded');b.classList.toggle('hidden');});parent.appendChild(h);parent.appendChild(b);},

  _select:function(id){var self=this;self._showLoad('加载中...');DB.getPhoto(id).then(function(p){if(!p){toast('照片数据丢失','err');self._hideLoad();return;}if(!self.urlCache[p.id+'_d'])self.urlCache[p.id+'_d']=URL.createObjectURL(p.dispBlob);if(!self.urlCache[p.id+'_t'])self.urlCache[p.id+'_t']=URL.createObjectURL(p.thumbBlob);self.cur=p;self._view(p);self._renderList();self._updateNavButtons();document.getElementById('btn-dl').disabled=false;document.getElementById('btn-del').disabled=false;document.getElementById('btn-send').disabled=false;document.getElementById('st-file').textContent=p.fileName;document.getElementById('viewer-empty').style.display='none';self._hideLoad();if(window.innerWidth<=768)self.collapseSidebar();}).catch(function(e){console.error(e);toast('加载失败','err');self._hideLoad();});},

  _view:function(p){var img=document.getElementById('viewer-img');img.src=this.urlCache[p.id+'_d'];img.style.display='block';var bar=document.getElementById('info-bar');bar.style.display='flex';document.getElementById('info-name').textContent=p.fileName;document.getElementById('info-size').textContent=fmtSize(p.fileSize);document.getElementById('info-dim').textContent=p.dispW+'×'+p.dispH;document.getElementById('info-fmt').textContent=p.format.toUpperCase();var srcEl=document.getElementById('info-source');if(p.sourceUserId&&p.sourceUsername){srcEl.textContent='来自: '+p.sourceUsername;srcEl.style.display='';}else{srcEl.style.display='none';}},

  _updateNavButtons:function(){var prev=document.getElementById('nav-prev'),next=document.getElementById('nav-next');if(this.photos.length>1&&window.innerWidth<=768){prev.style.display='flex';next.style.display='flex';}else{prev.style.display='none';next.style.display='none';}},
  navPhoto:function(dir){var self=this;if(!self.cur||self.photos.length<2)return;var idx=-1;for(var i=0;i<self.photos.length;i++){if(self.photos[i].id===self.cur.id){idx=i;break;}}if(idx<0)return;var next=idx+dir;if(next<0)next=self.photos.length-1;if(next>=self.photos.length)next=0;self._select(self.photos[next].id);},
  toggleSidebar:function(){document.getElementById('sidebar').classList.toggle('collapsed');},
  collapseSidebar:function(){var s=document.getElementById('sidebar');if(!s.classList.contains('collapsed'))s.classList.add('collapsed');},
  expandSidebar:function(){var s=document.getElementById('sidebar');if(s.classList.contains('collapsed'))s.classList.remove('collapsed');},

  deleteCurrent:function(){var self=this;if(!self.cur)return;if(!confirm('确定删除 "'+self.cur.fileName+'"？'))return;var id=self.cur.id;['_t','_d'].forEach(function(k){var ck=id+k;if(self.urlCache[ck]){URL.revokeObjectURL(self.urlCache[ck]);delete self.urlCache[ck];}});DB.removePhoto(id).then(function(){self.cur=null;document.getElementById('viewer-img').style.display='none';document.getElementById('info-bar').style.display='none';document.getElementById('viewer-empty').style.display='flex';document.getElementById('st-file').textContent='未打开文件';document.getElementById('btn-dl').disabled=true;document.getElementById('btn-del').disabled=true;document.getElementById('btn-send').disabled=true;return self.refresh();}).then(function(){self._updateNavButtons();toast('已删除','info');}).catch(function(e){console.error(e);toast('删除失败','err');});},

  // Send photo (copies blobs within IndexedDB — works cross-user on same browser)
  showSend:function(){var self=this;if(!self.cur)return;var ms=document.querySelectorAll('.modal-overlay');for(var i=0;i<ms.length;i++)ms[i].remove();UserStore.all().then(function(users){var others=users.filter(function(u){return u.id!==self.currentUser.id;});if(others.length===0){toast('没有其他用户可发送','info');return;}var overlay=document.createElement('div');overlay.className='modal-overlay';var cardsHTML='';for(var i=0;i<others.length;i++){cardsHTML+='<div class="send-user-card" data-uid="'+others[i].id+'"><span class="send-user-icon">👤</span><span class="send-user-name">'+esc(others[i].username)+'</span><span class="send-user-role">'+(others[i].role==='admin'?'管理员':'用户')+'</span></div>';}overlay.innerHTML='<div class="modal" style="max-width:420px"><h3>📨 发送照片</h3><p>将 <b>'+esc(self.cur.fileName)+'</b> 无损发送给其他用户</p><p style="font-size:10px;color:var(--t2)">接收用户将在「来自其他用户」分区中查看此照片</p><div class="send-user-list">'+cardsHTML+'</div><div class="send-err" id="send-err"></div><div class="btns"><button onclick="this.closest(\'.modal-overlay\').remove()">取消</button><button class="primary" id="btn-send-go" disabled>发送</button></div></div>';document.body.appendChild(overlay);var selUid=null;overlay.querySelectorAll('.send-user-card').forEach(function(card){card.addEventListener('click',function(){overlay.querySelectorAll('.send-user-card').forEach(function(c){c.classList.remove('sel');});card.classList.add('sel');selUid=card.dataset.uid;overlay.querySelector('#btn-send-go').disabled=false;});});overlay.querySelector('#btn-send-go').addEventListener('click',function(){if(!selUid)return;var btn=this;btn.disabled=true;btn.textContent='发送中...';overlay.remove();self._doSend(selUid);});overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove();});}).catch(function(e){console.error(e);toast('无法加载用户列表','err');});},

  _doSend:function(recipientId){var self=this;if(!self.cur)return;self._showLoad('发送中...');var copy={id:uid(),fileName:self.cur.fileName,fileSize:self.cur.fileSize,format:self.cur.format,rawBlob:self.cur.rawBlob,dispBlob:self.cur.dispBlob,thumbBlob:self.cur.thumbBlob,dispW:self.cur.dispW,dispH:self.cur.dispH,added:Date.now(),userId:recipientId,deviceId:self.cur.deviceId||self._deviceId,sourceUserId:self.currentUser.id,sourceUsername:self.currentUser.username};DB.addPhoto(copy).then(function(){self._hideLoad();toast('照片已发送','ok');}).catch(function(e){console.error(e);self._hideLoad();toast('发送失败','err');});},

  // Export
  showExport:function(){var self=this;if(!self.cur)return;var ms=document.querySelectorAll('.modal-overlay');for(var i=0;i<ms.length;i++)ms[i].remove();var overlay=document.createElement('div');overlay.className='modal-overlay';overlay.innerHTML='<div class="modal" style="max-width:500px"><h3>💾 下载</h3><p>'+esc(self.cur.fileName)+' ('+fmtSize(self.cur.fileSize)+')</p><p style="font-size:9px;color:var(--t2);margin-bottom:8px">所有格式均适用于任何照片类型 · TIFF 为无损格式</p><div class="fgrid"><div class="fopt sel" data-f="orig">原始文件</div><div class="fopt" data-f="jpeg">JPEG</div><div class="fopt" data-f="png">PNG</div><div class="fopt" data-f="webp">WebP</div><div class="fopt" data-f="tiff">TIFF 无损</div><div class="fopt" data-f="bmp">BMP</div></div><div class="qrow" id="qrow"><span style="font-size:10px;color:var(--t2)">画质:</span><input type="range" id="qsl" min="10" max="100" value="95"><span style="font-size:10px;color:var(--ac)" id="qval">95</span></div><div class="btns"><button onclick="this.closest(\'.modal-overlay\').remove()">取消</button><button class="primary" id="btn-go">下载</button></div></div>';document.body.appendChild(overlay);var sel='orig';overlay.querySelectorAll('.fopt').forEach(function(o){o.addEventListener('click',function(){overlay.querySelectorAll('.fopt').forEach(function(x){x.classList.remove('sel');});o.classList.add('sel');sel=o.dataset.f;overlay.querySelector('#qrow').style.display=(sel==='jpeg'||sel==='webp')?'flex':'none';});});overlay.querySelector('#qsl').addEventListener('input',function(){overlay.querySelector('#qval').textContent=this.value;});overlay.querySelector('#btn-go').addEventListener('click',function(){overlay.remove();self._export(sel,parseInt(overlay.querySelector('#qsl').value)/100);});overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove();});},
  _export:function(fmt,q){var self=this;if(fmt==='orig'){self._dl(self.cur.rawBlob,self.cur.fileName);toast('原始文件已下载','ok');return;}var mimes={jpeg:'image/jpeg',png:'image/png',webp:'image/webp',tiff:'image/tiff',bmp:'image/bmp'},exts={jpeg:'jpg',png:'png',webp:'webp',tiff:'tif',bmp:'bmp'},bn=self.cur.fileName.replace(/\.[^.]+$/,'');self._showLoad('转换中...');blobToImg(self.cur.dispBlob).then(function(img){var c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);var opts=(fmt==='jpeg'||fmt==='webp')?[mimes[fmt],q]:[mimes[fmt]];c.toBlob(function(b){self._dl(b,bn+'.'+exts[fmt]);self._hideLoad();toast('已下载 '+fmt.toUpperCase(),'ok');},opts[0],opts[1]);}).catch(function(){self._hideLoad();toast('转换失败','err');});},
  _dl:function(blob,fn){var u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(u);},5000);},
  _updateStore:function(){if('storage' in navigator&&'estimate' in navigator.storage)navigator.storage.estimate().then(function(e){document.getElementById('st-store').textContent='存储: '+(e.usage/1048576).toFixed(1)+' MB / '+(e.quota/1048576).toFixed(0)+' MB';}).catch(function(){});},

  // Admin: Register user
  showRegister:function(){var self=this;if(!self.currentUser||self.currentUser.role!=='admin'){toast('仅管理员可注册新用户','err');return;}var ms=document.querySelectorAll('.modal-overlay');for(var i=0;i<ms.length;i++)ms[i].remove();var overlay=document.createElement('div');overlay.className='modal-overlay';overlay.innerHTML='<div class="modal" style="max-width:420px"><h3>👤 注册新用户</h3><div class="form-field"><label>用户名</label><input type="text" id="reg-user" placeholder="请输入新用户名" autocomplete="off"></div><div class="form-field"><label>密码</label><input type="password" id="reg-pass" placeholder="请输入密码"></div><div class="form-field"><label>确认密码</label><input type="password" id="reg-pass2" placeholder="请再次输入密码"></div><div class="form-err" id="reg-err"></div><div class="btns"><button onclick="this.closest(\'.modal-overlay\').remove()">取消</button><button class="primary" id="btn-reg-go">注册</button></div></div>';document.body.appendChild(overlay);overlay.querySelector('#btn-reg-go').addEventListener('click',function(){var username=overlay.querySelector('#reg-user').value.trim(),pass=overlay.querySelector('#reg-pass').value,pass2=overlay.querySelector('#reg-pass2').value,errEl=overlay.querySelector('#reg-err');if(!username){errEl.textContent='请输入用户名';return;}if(username.length<2){errEl.textContent='用户名至少2个字符';return;}if(!pass){errEl.textContent='请输入密码';return;}if(pass.length<4){errEl.textContent='密码至少4个字符';return;}if(pass!==pass2){errEl.textContent='两次密码不一致';return;}var btn=overlay.querySelector('#btn-reg-go');btn.disabled=true;btn.textContent='注册中...';errEl.textContent='';UserStore.exists(username).then(function(exists){if(exists){errEl.textContent='用户名已存在';btn.disabled=false;btn.textContent='注册';return;}return UserStore.create(username,pass,'user');}).then(function(user){if(user){overlay.remove();toast('用户 "'+username+'" 注册成功！','ok');}else{btn.disabled=false;btn.textContent='注册';}}).catch(function(e){console.error(e);errEl.textContent='注册失败';btn.disabled=false;btn.textContent='注册';});});overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove();});setTimeout(function(){overlay.querySelector('#reg-user').focus();},100);}
};

// ============================================================
// Boot — pure offline, no network dependency
// ============================================================
document.addEventListener('DOMContentLoaded',function(){
  console.log('[RAW Vault] 启动中... IDB='+(IDB_AVAILABLE?'enabled':'disabled (memory mode)'));
  DB.open().then(function(){
    console.log('[RAW Vault] 数据库就绪，检查管理员账户...');
    return Auth.seedAdmin();
  }).then(function(){
    console.log('[RAW Vault] 管理员账户就绪，检查会话...');
    if(Auth.checkSession()){console.log('[RAW Vault] 会话有效，直接登录');Auth.hideLogin();App.init();}
    else{console.log('[RAW Vault] 无有效会话，显示登录页');Auth.showLogin();document.getElementById('login-user').focus();}
  }).catch(function(e){
    console.error('[RAW Vault] 启动失败:',e);
    var errMsg='初始化失败: '+(e.message||'未知错误');
    try{Auth.showLogin();}catch(ex){document.getElementById('login-overlay').style.display='flex';}
    var errEl=document.getElementById('login-err');
    if(errEl)errEl.textContent=errMsg;
    var btn=document.getElementById('login-btn');
    if(btn){btn.disabled=false;btn.textContent='重试';btn.onclick=function(){location.reload();};}
  });
});
</script>
</body>
